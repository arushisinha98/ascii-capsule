name: Run Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          export PATH="$HOME/.pixi/bin:$PATH"
          pixi --version

      - name: Set up pixi environment
        run: |
          export PATH="$HOME/.pixi/bin:$PATH"
          pixi install
        
      - name: Install package
        run: |
          export PATH="$HOME/.pixi/bin:$PATH"
          pixi run pip install -e .
        
      - name: Run pytest
        run: |
          export PATH="$HOME/.pixi/bin:$PATH"
          export PYTHONPATH=src
          pixi run pytest -v .

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build DSi C tests
        run: make -C dsi/tests clean && make -C dsi/tests

      - name: Run DSi C tests
        run: ./dsi/tests/test_content
